name: Export embedded dashboard data

on:
  push:
    paths:
      - '.github/workflows/export-embedded-data.yml'
      - 'index.html'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract and validate embedded data
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          index_path = Path('index.html')
          text = index_path.read_text(encoding='utf-8')
          token = 'const EMBEDDED_DATA='
          start = text.find(token)
          if start < 0:
              raise RuntimeError('EMBEDDED_DATA start was not found')

          json_start = start + len(token)
          candidates = [
              ';\nfunction embeddedKey',
              ';\r\nfunction embeddedKey',
              ';\n\nfunction embeddedKey',
          ]
          end = -1
          for marker in candidates:
              end = text.find(marker, json_start)
              if end >= 0:
                  break
          if end < 0:
              raise RuntimeError('EMBEDDED_DATA end was not found')

          data = json.loads(text[json_start:end])

          july22 = [r for r in data.get('daily_2026-07', []) if r.get('business_date') == '2026-07-22']
          if len(july22) != 1:
              raise RuntimeError(f'2026-07-22 row count must be 1, got {len(july22)}')
          row = july22[0]
          expected = {'total_sales': 278000, 'customers': 199, 'issued_count': 293}
          for key, value in expected.items():
              if int(row.get(key, -1)) != value:
                  raise RuntimeError(f'2026-07-22 {key} mismatch: {row.get(key)} != {value}')

          out = Path('data')
          out.mkdir(exist_ok=True)
          (out / 'embedded-data.json').write_text(
              json.dumps(data, ensure_ascii=False, indent=2) + '\n',
              encoding='utf-8'
          )

          manifest = {
              'source': 'index.html / const EMBEDDED_DATA',
              'schema_version': 1,
              'months': data.get('bootstrap', {}).get('months', []),
              'active_month': data.get('bootstrap', {}).get('active_month'),
              'verified_2026_07_22': expected,
              'note': 'This export is generated from the current production dashboard. The application still reads the embedded copy until migration is separately verified.'
          }
          (out / 'manifest.json').write_text(
              json.dumps(manifest, ensure_ascii=False, indent=2) + '\n',
              encoding='utf-8'
          )
          print('Embedded data exported and validated')
          PY

      - name: Commit generated data files
        run: |
          if git diff --quiet -- data; then
            echo 'No data changes'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add data/embedded-data.json data/manifest.json
          git commit -m '公開ダッシュボードの埋込データをJSONへ書き出し'
          git push
