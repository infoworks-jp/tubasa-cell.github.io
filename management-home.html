<!doctype html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>味一番つばさ 経営ホーム</title><style>:root{--ink:#17365d;--blue:#4472c4;--bg:#eef3f8;--muted:#64748b;--ok:#15803d;--bad:#b91c1c}*{box-sizing:border-box}body{margin:0;background:var(--bg);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Hiragino Sans","Yu Gothic",sans-serif;color:#1f2937}header{padding:22px;background:linear-gradient(135deg,#102d4f,#245b83);color:#fff}header h1{margin:0;font-size:26px}header p{margin:7px 0 0;opacity:.85}main{max-width:1400px;margin:auto;padding:18px}.top{display:flex;justify-content:space-between;gap:12px;align-items:center;flex-wrap:wrap}.badge{background:#dff4e5;color:#166534;padding:8px 12px;border-radius:999px;font-weight:700}.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:12px;margin:16px 0}.card,.panel{background:#fff;border-radius:14px;padding:16px;box-shadow:0 4px 18px #17365d18}.label{font-size:13px;color:var(--muted)}.value{font-size:27px;font-weight:850;color:var(--ink);margin:5px 0}.sub{font-size:12px;color:var(--muted)}.up{color:var(--ok);font-weight:800}.down{color:var(--bad);font-weight:800}.grid{display:grid;grid-template-columns:1.15fr .85fr;gap:14px}.panel h2{margin:0 0 12px;font-size:18px;color:var(--ink)}.insight{padding:12px 14px;background:#f8fafc;border-left:5px solid var(--blue);margin:9px 0;border-radius:7px}.priority{border-left-color:#ed7d31}.bar{height:12px;background:#e6edf5;border-radius:8px;overflow:hidden;margin:5px 0 13px}.bar i{display:block;height:100%;background:var(--blue)}table{width:100%;border-collapse:collapse;font-size:14px}th,td{padding:9px;border-bottom:1px solid #e5e7eb;text-align:right}th:first-child,td:first-child{text-align:left}a{color:var(--blue);font-weight:700}.error{background:#fee2e2;color:#991b1b;padding:14px;border-radius:10px}@media(max-width:850px){.grid{grid-template-columns:1fr}.value{font-size:23px}}</style></head><body><header><h1>味一番つばさ 経営ホーム</h1><p>日々の売上を「何が起きているか」「次に何をするか」で確認する画面</p></header><main><div class="top"><div><b id="period">読み込み中</b><div class="sub" id="updated"></div></div><span class="badge">公開データ連動</span></div><div id="app"><div class="panel">既存データを読み込んでいます…</div></div></main><script>const yen=n=>'¥'+Math.round(Number(n||0)).toLocaleString();const pct=n=>(Number(n||0)*100).toFixed(1)+'%';const sum=(a,k)=>a.reduce((s,x)=>s+(+x[k]||0),0);async function load(){try{const html=await fetch('./index.html?'+Date.now()).then(r=>r.text());const m=html.match(/const EMBEDDED_DATA=(\{[\s\S]*?\});\s*function embeddedKey/);if(!m)throw new Error('公開データを見つけられません');const d=JSON.parse(m[1]),b=d.bootstrap,month=b.active_month,daily=d['daily_'+month]||[],products=d['products_'+month]||[],hourly=(d['hourly_'+month]?.rows||d['hourly_'+month]||[]),monthly=d.monthly||[];const live=daily.filter(x=>+x.total_sales>0),sales=sum(live,'total_sales'),customers=sum(live,'customers'),days=live.length,avg=days?sales/days:0,spend=customers?sales/customers:0,latest=live[live.length-1]||{},prev=live[live.length-2]||{},priorMonth=monthly.length>1?monthly[monthly.length-2]:null,projection=avg*27;const ranked=[...products].sort((a,b)=>b.sales-a.sales),top=ranked.slice(0,5),productTotal=sum(products,'sales'),beer=products.filter(x=>/ビール/.test(x.name)).reduce((s,x)=>s+(+x.sales||0),0);const period={昼:0,夜:0,深夜:0,その他:0};hourly.forEach(x=>period[x.period||'その他']=(period[x.period||'その他']||0)+(+x.sales||0));const hTotal=Object.values(period).reduce((a,c)=>a+c,0),night=(period.夜||0)+(period.深夜||0);const dailyDiff=prev.total_sales?(latest.total_sales-prev.total_sales)/prev.total_sales:0;const monthDiff=priorMonth?.avg_daily?(avg-priorMonth.avg_daily)/priorMonth.avg_daily:0;document.getElementById('period').textContent=month.replace('-','年')+'月・最新 '+(latest.business_date||'未入力');document.getElementById('updated').textContent='既存ダッシュボードの登録データを自動参照';document.getElementById('app').innerHTML=`<div class="cards">${card('月間売上',yen(sales),days+'営業日')}${card('平均日商',yen(avg),trend(monthDiff,'前月平均日商比'))}${card('客数',customers.toLocaleString()+'人','1日平均 '+(days?customers/days:0).toFixed(1)+'人')}${card('客単価',yen(spend),'売上÷客数')}${card('最新日売上',yen(latest.total_sales||0),trend(dailyDiff,'前営業日比'))}${card('着地予測',yen(projection),'27営業日換算')}</div><div class="grid"><section class="panel"><h2>本日の経営判断</h2><div class="insight"><b>売上の勢い</b><br>平均日商は ${yen(avg)}。前月平均日商比は ${monthDiff>=0?'改善':'低下'} ${Math.abs(monthDiff*100).toFixed(1)}％です。</div><div class="insight"><b>客単価</b><br>${yen(spend)}。売上を伸ばすには、客数と追加注文のどちらが動いたかを毎日分けて確認します。</div><div class="insight"><b>夜間依存</b><br>夜＋深夜の構成比は ${pct(hTotal?night/hTotal:0)}。時間帯ごとの人員配置判断に使います。</div><div class="insight priority"><b>次の優先行動</b><br>${monthDiff<0?'客数低下日の曜日・時間帯・商品構成を確認する。':'好調日の売れ筋と時間帯を特定し、再現できる施策にする。'}</div><p><a href="./index.html">詳細ダッシュボードを開く →</a></p></section><section class="panel"><h2>重点商品</h2>${top.length?top.map(x=>`<div><b>${esc(x.name)}</b><span style="float:right">${yen(x.sales)}</span><div class="bar"><i style="width:${productTotal?x.sales/productTotal*100:0}%"></i></div></div>`).join(''):'商品データなし'}<div class="insight"><b>ビール売上</b><br>${yen(beer)}／商品売上構成比 ${pct(productTotal?beer/productTotal:0)}</div></section></div><section class="panel" style="margin-top:14px"><h2>直近7営業日</h2><table><thead><tr><th>日付</th><th>売上</th><th>客数</th><th>客単価</th></tr></thead><tbody>${live.slice(-7).reverse().map(x=>`<tr><td>${x.business_date}</td><td>${yen(x.total_sales)}</td><td>${x.customers}人</td><td>${yen(x.avg_spend)}</td></tr>`).join('')}</tbody></table></section>`}catch(e){document.getElementById('app').innerHTML='<div class="error">読み込みに失敗しました：'+esc(e.message)+'</div>'}}function card(l,v,s){return `<div class="card"><div class="label">${l}</div><div class="value">${v}</div><div class="sub">${s}</div></div>`}function trend(v,l){return `<span class="${v>=0?'up':'down'}">${l} ${v>=0?'+':''}${(v*100).toFixed(1)}%</span>`}function esc(s){return String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}load();</script></body></html>
